name: Daily Paper Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "5 13 * * 1-5"
    - cron: "5 14 * * 1-5"

permissions:
  contents: write

concurrency:
  group: daily-paper-radar
  cancel-in-progress: false

jobs:
  update-radar:
    runs-on: ubuntu-latest
    env:
      AI_PAPER_RADAR_TZ: America/New_York
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Decide whether this scheduled slot should run
        id: gate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ny_hour="$(TZ=America/New_York date +%H)"
          ny_weekday="$(TZ=America/New_York date +%u)"
          if [[ "$ny_weekday" =~ ^[1-5]$ && "$ny_hour" == "09" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Configure Git identity
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run daily pipeline
        if: steps.gate.outputs.should_run == 'true'
        run: python scripts/run_daily_pipeline.py

      - name: Show final Git status
        if: always()
        run: git status --short --branch
